<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cdatso.be</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      background: #faf8f4;
      color: #1a1a1a;
      padding: 2rem;
    }
    main {
      max-width: 34rem;
      text-align: center;
    }
    .mark {
      font-size: 0.78rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #b8993f;
      margin-bottom: 1.4rem;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.1rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 2.2rem;
    }
    a.cta {
      display: inline-block;
      padding: 0.75rem 1.8rem;
      border: 1px solid #b8993f;
      border-radius: 2px;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: background 0.2s, color 0.2s;
    }
    a.cta:hover { background: #b8993f; color: #fff; }
    footer {
      position: fixed;
      bottom: 1.4rem;
      left: 0; right: 0;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 0.72rem;
      color: #aaa;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #14140f; color: #f0ede6; }
      p { color: #b5b0a6; }
      a.cta { color: #f0ede6; }
      footer { color: #666; }
    }
  </style>
</head>
<body>
  <main>
    <p class="mark">Christo Datso</p>
    <h1>Analyses de&nbsp;films</h1>
    <p>Critiques de cinéma sourcées&nbsp;: contexte, mise en scène, thèmes et postérité, une œuvre à la fois.</p>
    <a class="cta" href="/analyses-de-films/">Entrer dans le catalogue&nbsp;→</a>
  </main>
  <footer>cdatso.be — page d'accueil provisoire</footer>
</body>
</html>
